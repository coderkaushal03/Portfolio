<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#b026ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="25" fill="#050505" stroke="url(#neonGradient)" stroke-width="4" />
  <text x="50" y="70" font-family="monospace, sans-serif" font-size="65" font-weight="bold" fill="url(#neonGradient)" text-anchor="middle" filter="url(#glow)">K</text>
</svg>
